server.port=8080

# H2 Database (for testing)
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/feedback_loop?replicaSet=rs0
spring.data.mongodb.database=feedback_loop

# Ollama Configuration
langchain4j.ollama.base-url=http://localhost:11434
langchain4j.ollama.model-name=gemma2:2b
langchain4j.ollama.temperature=0.3

# Actuator endpoints for monitoring
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
